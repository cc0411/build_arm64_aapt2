name: Build aapt2 ARM64 (Standalone)

on:
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          # 安装基础编译工具、Git、Python3 以及 Protobuf 编译器
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential \
                                  zip curl zlib1g-dev gcc-multilib g++-multilib \
                                  libc6-dev-i386 libncurses5-dev lib32z1-dev \
                                  ccache libgl1-mesa-dev libxml2-utils xsltproc unzip \
                                  python3 protobuf-compiler libprotobuf-dev

      - name: Clone Standalone aapt2 Source
        run: |
          # 使用一个包含完整 CMake 配置的独立 aapt2 镜像源
          # 这个源解决了原生 AOSP 源码无法单独编译的问题
          git clone --recurse-submodules https://github.com/niclab/aapt2.git aapt2_src

      - name: Download & Setup NDK
        run: |
          # 下载适合编译最新 aapt2 的 NDK 版本 (r21e 兼容性较好)
          wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          
          # 设置环境变量
          echo "NDK_HOME=$(pwd)/android-ndk-r21e" >> $GITHUB_ENV
          echo "TOOLCHAIN=$(pwd)/android-ndk-r21e/toolchains/llvm/prebuilt/linux-x86_64" >> $GITHUB_ENV

      - name: Configure CMake for ARM64
        run: |
          mkdir -p aapt2_build
          cd aapt2_build
          
          # 配置 CMake，指定目标架构为 aarch64 (ARM64)
          cmake ../aapt2_src \
            -DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-29 \
            -DCMAKE_BUILD_TYPE=Release \
            -DProtobuf_PROTOC_EXECUTABLE=/usr/bin/protoc

      - name: Compile aapt2
        run: |
          cd aapt2_build
          # 使用多核并行编译
          make -j$(nproc)

      - name: Verify Binary
        run: |
          file aapt2_build/aapt2
          # 检查输出是否包含 "aarch64" 字样

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-arm64-v8a
          path: aapt2_build/aapt2
