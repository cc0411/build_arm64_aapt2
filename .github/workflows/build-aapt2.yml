name: Build aapt2 from Source (Fixed)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y repo git-core gnupg flex bison gperf build-essential \
            zip curl zlib1g-dev gcc-multilib g++-multilib libc6-dev-i386 \
            libncurses5-dev lib32z1-dev ccache libgl1-mesa-dev libxml2-utils \
            xsltproc unzip python3

      - name: Initialize AOSP Repo (Minimal)
        run: |
          mkdir aosp_src && cd aosp_src
          repo init -u https://android.googlesource.com/platform/manifest -b master --depth=1
          
          # 创建 custom manifest 只拉取 aapt2 及其强依赖
          cat > .repo/local_manifests/aapt2.xml <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <project path="build/blueprint" name="platform/build/blueprint" />
            <project path="build/soong" name="platform/build/soong" />
            <project path="frameworks/base" name="platform/frameworks/base" />
            <project path="system/core" name="platform/system/core" />
            <project path="system/libbase" name="platform/system/libbase" />
            <project path="external/protobuf" name="platform/external/protobuf" />
            <project path="external/zlib" name="platform/external/zlib" />
            <project path="external/libpng" name="platform/external/libpng" />
          </manifest>
          EOF
          
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle

      - name: Setup Build Environment
        run: |
          cd aosp_src
          source build/envsetup.sh
          lunch aosp_arm64-eng

      - name: Compile aapt2
        run: |
          cd aosp_src
          # 使用 Soong 构建系统编译 aapt2
          m aapt2 -j$(nproc --all)
      
      - name: Collect Binary
        run: |
          mkdir -p output
          # 找到编译好的二进制文件并复制出来
          find aosp_src/out -name "aapt2" -type f -exec cp {} output/ \;
          ls -lh output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-aapt2
          path: output/aapt2
