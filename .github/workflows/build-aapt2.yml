name: Build aapt2 for ARM64

on:
  workflow_dispatch: # 允许在 GitHub 页面手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: |
          sudo apt-get update
          # 安装 AOSP 编译所需的基础工具链
          sudo apt-get install -y git-core gnupg flex bison gperf build-essential \
                                  zip curl zlib1g-dev gcc-multilib g++-multilib \
                                  libc6-dev-i386 lib32ncurses5-dev x11proto-core-dev \
                                  libx11-dev lib32z-dev ccache libgl1-mesa-dev \
                                  libxml2-utils xsltproc unzip python3 repo cmake ninja-build

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Initialize and Sync AOSP Source (Minimal)
        run: |
          mkdir aosp && cd aosp
          # 初始化 Android 13 源码树（此版本 aapt2 完全兼容 Apktool 2.5+）
          repo init -u https://android.googlesource.com/platform/manifest -b android-13.0.0_r1 --depth=1
          # 仅同步 aapt2 及其核心依赖模块，避免下载整个 AOSP
          repo sync -c --no-tags -j$(nproc) platform/frameworks/base \
                                                   platform/system/core \
                                                   platform/external/protobuf \
                                                   platform/external/abseil-cpp \
                                                   platform/build/soong \
                                                   platform/bionic \
                                                   platform/system/libbase

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Build aapt2 with NDK Cross Compile
        env:
          NDK_ROOT: ${{ env.NDK_ROOT }}
        run: |
          cd aosp/frameworks/base/tools/aapt2
          mkdir build && cd build
          
          # 使用 NDK 提供的 CMake 工具链进行 ARM64 交叉编译
          cmake .. \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.NDK_ROOT }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DCMAKE_BUILD_TYPE=Release
          
          ninja -j$(nproc)

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-arm64
          path: aosp/frameworks/base/tools/aapt2/build/aapt2
