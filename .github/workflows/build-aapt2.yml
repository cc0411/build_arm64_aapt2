name: Build Native ARM64 AAPT2

on:
  workflow_dispatch: # 允许在 GitHub 网页上手动触发
  push:
    branches: [ main ]

jobs:
  build-aapt2:
    runs-on: ubuntu-latest  # 使用 GitHub 提供的 x86_64 服务器

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          # 安装基础编译工具、zlib 以及 ARM64 交叉编译工具链
          sudo apt-get install -y build-essential git libz-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Clone AOSP Base Repo
        run: |
          # 浅克隆以节省时间和空间
          git clone --depth 1 https://android.googlesource.com/platform/frameworks/base
          cd base

      - name: Cross-Compile AAPT2 for ARM64
        run: |
          cd base
          # 指定交叉编译器环境变量，并执行编译
          export CC=aarch64-linux-gnu-gcc
          export CXX=aarch64-linux-gnu-g++
          make aapt2 -j$(nproc)

      - name: Upload ARM64 AAPT2 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aapt2-linux-arm64
          path: base/out/host/linux-arm64/bin/aapt2
